steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/karatuai-teachers-companion'
      - '--build-arg'
      - 'VITE_CLASSROOM_FORM_ENDPOINT=${_VITE_CLASSROOM_FORM_ENDPOINT}'
      - '--build-arg'
      - 'VITE_SUPPORT_FORM_ENDPOINT=${_VITE_SUPPORT_FORM_ENDPOINT}'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/karatuai-teachers-companion']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'karatuai-teachers-companion'
      - '--image'
      - 'gcr.io/$PROJECT_ID/karatuai-teachers-companion'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '256Mi'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'

images:
  - 'gcr.io/$PROJECT_ID/karatuai-teachers-companion'

substitutions:
  _VITE_CLASSROOM_FORM_ENDPOINT: ''
  _VITE_SUPPORT_FORM_ENDPOINT: ''
