server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # Cloud Run terminates TLS upstream and forwards to this container on :8080.
    # Without these, nginx's default directory-trailing-slash redirect (e.g.
    # /curriculum -> /curriculum/) writes an absolute Location header containing
    # the listen port and an http:// scheme, sending users to
    # http://host:8080/... which the browser blocks as insecure. Relative
    # redirects let the browser reuse the original scheme/host/port.
    absolute_redirect off;
    port_in_redirect off;

    location / {
        # No $uri/ step: this is a single-page app, every non-asset path must
        # fall through to index.html so the React router can handle it. Probing
        # for a directory match would 403 on any empty dir that lands in dist
        # (and trigger a trailing-slash redirect we don't want for app routes).
        try_files $uri /index.html;
        add_header Cache-Control "no-cache";
    }

    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.mjs$ {
        default_type application/javascript;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.wasm$ {
        default_type application/wasm;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
